<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук каналів Zello</title>
</head>
<body>
    <h1>Пошук каналів Zello</h1>
    
    <div>
        <label>
            Шаблон каналу:
            <input type="text" id="template" value="АТО Донецк #" placeholder="АТО Донецк #" oninput="saveInputs()">
        </label>
        <label>
            Символ заміни:
            <input type="text" id="placeholder" value="#" maxlength="1" size="3" oninput="saveInputs()">
        </label>
    </div>
    
    <div>
        <label>
            Від:
            <input type="number" id="fromNumber" value="1" min="0" oninput="saveInputs()">
        </label>
        <button onclick="swapFromTo()">⇄</button>
        <label>
            До:
            <input type="number" id="toNumber" value="10" min="0" oninput="saveInputs()">
        </label>
    </div>
    
    <div>
        <label>
            Пауза між запитами (сек):
            <input type="number" id="delay" value="1" min="0" step="0.1" oninput="saveInputs()">
        </label>
        <label>
            Символ паддінгу:
            <input type="text" id="padChar" value="0" maxlength="1" size="3" oninput="saveInputs()">
        </label>
    </div>
    
    <div>
        <label>
            Проксі сервер:
            <input type="text" id="proxyServer" value="https://corsproxy.io/?" placeholder="https://corsproxy.io/?" style="width: 300px;" oninput="saveInputs()">
        </label>
        <label>
            <input type="checkbox" id="useProxy" checked onchange="saveInputs()">
            Використовувати проксі
        </label>
    </div>
    
    <div>
        <button onclick="searchChannels()">Пошук</button>
        <button onclick="stopSearch()">Зупинити</button>
        <button onclick="clearCache()">Очистити кеш</button>
    </div>
    
    <div>
        <h2>Пресети:</h2>
        <select id="presetsSelect" onchange="loadPresetFromSelect()">
            <option value="">-- Оберіть пресет --</option>
        </select>
        <button onclick="deleteSelectedPreset()">Видалити обраний</button>
    </div>
    
    <div>
        <h2>Прогрес: <span id="progress">0/0</span> (Кеш: <span id="cacheCount">0</span>)</h2>
        <p>Поточний: <span id="currentChannel">-</span></p>
    </div>
    
    <div>
        <h2>Результати:</h2>
        <div id="results"></div>
    </div>

    <script>
        let stopRequested = false;
        const DB_NAME = 'ZelloChannelCache';
        const DB_VERSION = 2;
        const STORE_NAME = 'channels';
        const PRESETS_STORE = 'presets';
        const SETTINGS_KEY = 'zello_search_settings';
        let db;

        function saveInputs() {
            const settings = {
                template: document.getElementById('template').value,
                placeholder: document.getElementById('placeholder').value,
                fromNumber: document.getElementById('fromNumber').value,
                toNumber: document.getElementById('toNumber').value,
                delay: document.getElementById('delay').value,
                padChar: document.getElementById('padChar').value,
                proxyServer: document.getElementById('proxyServer').value,
                useProxy: document.getElementById('useProxy').checked
            };
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        }

        function loadInputs() {
            try {
                const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY));
                if (settings) {
                    if (settings.template) document.getElementById('template').value = settings.template;
                    if (settings.placeholder) document.getElementById('placeholder').value = settings.placeholder;
                    if (settings.fromNumber) document.getElementById('fromNumber').value = settings.fromNumber;
                    if (settings.toNumber) document.getElementById('toNumber').value = settings.toNumber;
                    if (settings.delay) document.getElementById('delay').value = settings.delay;
                    if (settings.padChar) document.getElementById('padChar').value = settings.padChar;
                    if (settings.proxyServer !== undefined) document.getElementById('proxyServer').value = settings.proxyServer;
                    if (settings.useProxy !== undefined) document.getElementById('useProxy').checked = settings.useProxy;
                }
            } catch (e) {
                console.error('Помилка завантаження налаштувань:', e);
            }
        }

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'channelName' });
                    }
                    if (!db.objectStoreNames.contains(PRESETS_STORE)) {
                        db.createObjectStore(PRESETS_STORE, { keyPath: 'id', autoIncrement: true });
                    }
                };
            });
        }

        async function saveToCache(channelName, data) {
            if (!db) await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put({
                    channelName: channelName,
                    data: data,
                    timestamp: Date.now()
                });
                request.onsuccess = () => {
                    updateCacheCount();
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function getFromCache(channelName) {
            if (!db) await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(channelName);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function clearCache() {
            if (!db) await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => {
                    updateCacheCount();
                    alert('Кеш очищено');
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function getCacheCount() {
            if (!db) await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.count();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function updateCacheCount() {
            const count = await getCacheCount();
            document.getElementById('cacheCount').textContent = count;
        }

        function stopSearch() {
            stopRequested = true;
        }

        function swapFromTo() {
            const fromInput = document.getElementById('fromNumber');
            const toInput = document.getElementById('toNumber');
            const temp = fromInput.value;
            fromInput.value = toInput.value;
            toInput.value = temp;
            saveInputs();
        }

        function beep() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function beepFound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 1200;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        async function savePreset(settings) {
            if (!db) await initDB();
            
            // Проверяем наличие дубликатов
            const existingPresets = await new Promise((resolve, reject) => {
                const transaction = db.transaction([PRESETS_STORE], 'readonly');
                const store = transaction.objectStore(PRESETS_STORE);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
            
            // Проверяем есть ли такой же пресет
            const isDuplicate = existingPresets.some(preset => 
                preset.template === settings.template &&
                preset.placeholder === settings.placeholder &&
                preset.fromNumber === settings.fromNumber &&
                preset.toNumber === settings.toNumber &&
                preset.padChar === settings.padChar
            );
            
            if (isDuplicate) {
                return; // Не добавляем дубликат
            }
            
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([PRESETS_STORE], 'readwrite');
                const store = transaction.objectStore(PRESETS_STORE);
                const preset = {
                    ...settings,
                    timestamp: Date.now()
                };
                const request = store.add(preset);
                request.onsuccess = () => {
                    loadPresets();
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function loadPresets() {
            if (!db) await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([PRESETS_STORE], 'readonly');
                const store = transaction.objectStore(PRESETS_STORE);
                const request = store.getAll();
                request.onsuccess = () => {
                    displayPresets(request.result);
                    resolve(request.result);
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function deletePreset(id) {
            if (!db) await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([PRESETS_STORE], 'readwrite');
                const store = transaction.objectStore(PRESETS_STORE);
                const request = store.delete(id);
                request.onsuccess = () => {
                    loadPresets();
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        function displayPresets(presets) {
            const presetsSelect = document.getElementById('presetsSelect');
            
            // Очищаем, оставляя только первый option
            presetsSelect.innerHTML = '<option value="">-- Оберіть пресет --</option>';
            
            if (presets.length === 0) {
                return;
            }

            presets.reverse().forEach(preset => {
                const option = document.createElement('option');
                option.value = preset.id;
                option.textContent = `${preset.template} (${preset.fromNumber}-${preset.toNumber})`;
                presetsSelect.appendChild(option);
            });
        }

        function loadPresetFromSelect() {
            const presetsSelect = document.getElementById('presetsSelect');
            const presetId = parseInt(presetsSelect.value);
            if (presetId) {
                loadPreset(presetId);
            }
        }

        function deleteSelectedPreset() {
            const presetsSelect = document.getElementById('presetsSelect');
            const presetId = parseInt(presetsSelect.value);
            if (presetId) {
                deletePreset(presetId);
                presetsSelect.value = '';
            } else {
                alert('Оберіть пресет для видалення');
            }
        }

        function loadPreset(id) {
            if (!db) return;
            const transaction = db.transaction([PRESETS_STORE], 'readonly');
            const store = transaction.objectStore(PRESETS_STORE);
            const request = store.get(id);
            request.onsuccess = () => {
                const preset = request.result;
                if (preset) {
                    document.getElementById('template').value = preset.template;
                    document.getElementById('placeholder').value = preset.placeholder;
                    document.getElementById('fromNumber').value = preset.fromNumber;
                    document.getElementById('toNumber').value = preset.toNumber;
                    document.getElementById('delay').value = preset.delay;
                    document.getElementById('padChar').value = preset.padChar;
                    saveInputs();
                }
            };
        }

        function stopSearch() {
            stopRequested = true;
        }

        window.onload = async function() {
            await initDB();
            await updateCacheCount();
            loadInputs();
            await loadPresets();
        };

        async function searchChannels() {
            const template = document.getElementById('template').value;
            const placeholder = document.getElementById('placeholder').value || '#';
            const fromNumber = parseInt(document.getElementById('fromNumber').value);
            const toNumber = parseInt(document.getElementById('toNumber').value);
            const delay = parseFloat(document.getElementById('delay').value) * 1000;
            const padChar = document.getElementById('padChar').value || '0';
            const proxyServer = document.getElementById('proxyServer').value || '';
            const useProxy = document.getElementById('useProxy').checked;
            const resultsDiv = document.getElementById('results');
            const progressSpan = document.getElementById('progress');
            const currentChannelSpan = document.getElementById('currentChannel');
            
            stopRequested = false;
            resultsDiv.innerHTML = `
                <table border="1" cellpadding="5" cellspacing="0" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>Канал</th>
                            <th>Власник</th>
                            <th>Підписників</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                    </tbody>
                </table>
            `;
            currentChannelSpan.textContent = '-';
            
            if (!template.includes(placeholder)) {
                alert(`Шаблон повинен містити символ ${placeholder} для підстановки`);
                return;
            }
            
            // Автоматическое определение паддинга по количеству символов заміни
            const regex = new RegExp(`${placeholder.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}+`, 'g');
            const matches = template.match(regex);
            const padLength = matches && matches.length > 0 ? matches[0].length : 0;
            
            // Определяем направление и шаг
            const step = fromNumber <= toNumber ? 1 : -1;
            const total = Math.abs(toNumber - fromNumber) + 1;
            let completed = 0;
            
            // Сохраняем пресет
            await savePreset({
                template,
                placeholder,
                fromNumber,
                toNumber,
                delay: delay / 1000,
                padChar
            });
            
            for (let i = fromNumber; step > 0 ? i <= toNumber : i >= toNumber; i += step) {
                if (stopRequested) {
                    const resultsBody = document.getElementById('resultsBody');
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td colspan="3"><strong>Пошук зупинено користувачем</strong></td>';
                    resultsBody.appendChild(tr);
                    break;
                }
                
                // Применяем паддинг если нужно
                const numberStr = padLength > 0 ? String(i).padStart(padLength, padChar) : String(i);
                // Заменяем все последовательные символы placeholder на число
                const regex = new RegExp(`${placeholder.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}+`);
                const channelName = template.replace(regex, numberStr);
                progressSpan.textContent = `${completed + 1}/${total}`;
                currentChannelSpan.textContent = channelName;
                
                // Проверяем кеш
                const cached = await getFromCache(channelName);
                
                if (cached) {
                    console.log(`Використовуємо кеш для: ${channelName}`);
                    displayResults(channelName, cached.data, true, resultsDiv);
                } else {
                    console.log(`Запит до API для: ${channelName}`);
                    try {
                        // Ждем завершения запроса
                        const apiUrl = `https://search.zello.com/find_channels?name=${encodeURIComponent(channelName)}`;
                        const url = useProxy ? `${proxyServer}${apiUrl}` : apiUrl;
                        const response = await fetch(url);
                        
                        // Проверяем статус ответа
                        if (response.status !== 200) {
                            console.error(`Помилка HTTP ${response.status} для ${channelName}`);
                            const resultsBody = document.getElementById('resultsBody');
                            const tr = document.createElement('tr');
                            tr.innerHTML = '<td colspan="3" style="color: red;"><strong>Помилка: HTTP ' + response.status + '. Пошук зупинено.</strong></td>';
                            resultsBody.appendChild(tr);
                            break;
                        }
                        
                        const data = await response.json();
                        
                        // Сохраняем в кеш и ждем завершения
                        await saveToCache(channelName, data);
                        
                        // Отображаем результаты
                        displayResults(channelName, data, false, resultsDiv);
                        
                        // Пауза после успешного запроса к API
                        if (i < toNumber && delay > 0) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                        }
                    } catch (error) {
                        console.error(`Помилка для ${channelName}:`, error);
                        const resultsBody = document.getElementById('resultsBody');
                        const tr = document.createElement('tr');
                        tr.innerHTML = '<td colspan="3" style="color: red;"><strong>Помилка мережі: ' + error.message + '. Пошук зупинено.</strong></td>';
                        resultsBody.appendChild(tr);
                        break;
                    }
                }
                
                completed++;
                progressSpan.textContent = `${completed}/${total}`;
            }
            
            const resultsBody = document.getElementById('resultsBody');
            if (!stopRequested) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="3"><strong>Пошук завершено</strong></td>';
                resultsBody.appendChild(tr);
            }
            currentChannelSpan.textContent = '-';
            beep();
        }

        function displayResults(searchName, data, fromCache, resultsDiv) {
            // Показываем только если каналы найдены
            if (data.channel_list && data.channel_list.length > 0) {
                // Звуковой сигнал при находке (только для новых, не из кеша)
                if (!fromCache) {
                    beepFound();
                }
                
                const tbody = document.getElementById('resultsBody');
                data.channel_list.forEach((channel, index) => {
                    const subscribers = data.subscribers[index] || 0;
                    const owner = data.owner[index] || 'N/A';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${channel}</td>
                        <td>${owner}</td>
                        <td>${subscribers}</td>
                    `;
                    tbody.insertBefore(tr, tbody.firstChild);
                });
            }
        }
    </script>
</body>
</html>
